  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style id="theme-vars">
    :root {
      --tp: #F9A8C2;
      --ts: #C97A9A;
      --tb: #FDF0F5;
      --tbd: #F5E0EC;
      --td: #4A2D3A;
      --tlt: #FFF5F9;
    }
  </style>
  <style>
    * { box-sizing: border-box; }
    body { background: var(--tb); font-family: Georgia, serif; margin: 0; min-height: 100vh; }
    input, button, select, textarea { font-family: Georgia, serif; }

    #sheet-add {
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sheet-add.open { transform: translateY(0); }
    #sheet-add { overscroll-behavior: contain; }

    .hidden { display: none !important; }
    .view { min-height: calc(100vh - 72px); padding-bottom: 80px; }

    .nav-tab.active { color: var(--td); }
    .nav-tab { color: var(--ts); font-size: 11px; text-align: center; cursor: pointer; background: none; border: none; padding: 4px 8px; }

    .svc-chip.selected { background: var(--tp) !important; border-color: var(--ts) !important; font-weight: 700; }
    button { touch-action: manipulation; }

    #screen-loading {
      position: fixed; inset: 0; background: var(--tb);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200;
    }
    .spinner {
      width: 48px; height: 48px; border: 5px solid var(--tbd);
      border-top-color: var(--ts); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #screen-auth {
      position: fixed; inset: 0; background: var(--tb);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; z-index: 100; overflow-y: auto;
    }
  </style>
</head>

    <div id="auth-content" style="width:100%;max-width:380px"></div>
  </div>

  <!-- App views -->

  <div id="view-summary" class="view hidden"></div>
  <div id="view-settings" class="view hidden"></div>

  <div id="sheet-overlay"
    class="fixed inset-0 z-40 hidden"
    style="background:rgba(0,0,0,0.4)"

  </div>

  <div id="sheet-add"
    class="fixed bottom-0 left-0 right-0 z-50 bg-white rounded-t-3xl overflow-y-auto"

    <div id="sheet-content"></div>

    // ── THEMES ────────────────────────────────────────────────────────────
    const THEMES = {
      blush:  { tp:'#F9A8C2', ts:'#C97A9A', tb:'#FDF0F5', tbd:'#F5E0EC', td:'#4A2D3A', tlt:'#FFF5F9' },
      ocean:  { tp:'#7EC8E3', ts:'#4A9FC4', tb:'#F0F8FF', tbd:'#C5DFF0', td:'#1A3D5C', tlt:'#EBF5FF' },
      forest: { tp:'#86C9A4', ts:'#4E9E7A', tb:'#F0FAF5', tbd:'#C4E8D5', td:'#1B3D2A', tlt:'#E8F7EE' },
      slate:  { tp:'#94A3B8', ts:'#64748B', tb:'#F8FAFC', tbd:'#E2E8F0', td:'#1E293B', tlt:'#F1F5F9' },
    };

    const DEFAULT_SERVICES = [
      'Pedi #1','Pedi #2','Pedi #3','Pedi #4','Pedi #5',
      'Pedi #6','Pedi #7','Pedi #8','Pedi #9','Pedi #10',
      'Mani #1','Mani #2','Mani #3','Mani #4','Mani #5',
      'Mani #6','Mani #7','Mani #8','Mani #9','Mani #10',
      'Full Set Acrylic','Acrylic Fill',
      'Dip Powder / SNS','Gel Polish',
      'Nail Art','French Tip','Chrome / Glitter','Nail Repair',
      'Gel Removal','Acrylic Removal',
      'Wax','Eyelash Extensions'
    ];

    // ── STATE ─────────────────────────────────────────────────────────────
    let state = { entries: [], settings: {} };
    let lang = 'en';
    let currentView = 'calendar';
    let currentDate = new Date();
    let selectedDay = null;
    let editingServiceIdx = null;
    let editingEntryId = null;
    let currentPeriod = 'biweekly';
    let summaryAnchor = new Date();
    let currentUser = null;
    let settingsSaveTimer = null;

    // ── HELPERS ───────────────────────────────────────────────────────────
    const t = key => (STRINGS[lang] && STRINGS[lang][key] !== undefined) ? STRINGS[lang][key] : key;

    function applyTheme(name) {
      const colors = THEMES[name] || THEMES.blush;
      const root = document.documentElement;
      Object.entries(colors).forEach(([k, v]) => root.style.setProperty('--' + k, v));
    }

    function setTheme(name) {
      state.settings.theme = name;
      applyTheme(name);
      saveToStorage();
      renderSettings();
    }

    function generateId() {
      return crypto.randomUUID ? crypto.randomUUID()
        : Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function formatDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getDayEntries(dateStr) {
      return state.entries.filter(e => e.date === dateStr).sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    }

    function getDayTotal(dateStr) {
      return getDayEntries(dateStr).reduce((s, e) => s + (e.price || 0), 0);
    }

    function getPeriodRange(type, anchor) {
      const d = new Date(anchor.getFullYear(), anchor.getMonth(), anchor.getDate());
      let start, end;
      if (type === 'weekly') {
        const dow = d.getDay();
        start = new Date(d); start.setDate(d.getDate() - dow);
        end = new Date(start); end.setDate(start.getDate() + 6);
      } else if (type === 'biweekly') {
        const dow = d.getDay();
        start = new Date(d); start.setDate(d.getDate() - dow);
        end = new Date(start); end.setDate(start.getDate() + 13);
      } else {
        start = new Date(d.getFullYear(), d.getMonth(), 1);
        end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      }
      return { start: formatDate(start), end: formatDate(end) };
    }

    function getPeriodEntries(start, end) {
      return state.entries.filter(e => e.date >= start && e.date <= end);
    }

    // ── SUPABASE DATA LAYER ───────────────────────────────────────────────
    async function loadFromSupabase() {
      if (!currentUser) return;

      const [{ data: entries }, { data: settings }] = await Promise.all([
        db.from('entries').select('*').order('date'),
        db.from('user_settings').select('*').eq('user_id', currentUser.id).single()
      ]);

      state.entries = (entries || []).map(e => ({
        id: e.id, date: e.date, time: e.time || '',
        name: e.name || '', services: e.services || [],
        price: e.price || 0, notes: e.notes || ''
      }));

      if (settings) {
        state.settings = {
          services: (settings.services && settings.services.length) ? settings.services : [...DEFAULT_SERVICES],
          currencySymbol: settings.currency_symbol || '$',
          commissionRate: settings.commission_rate || null,
          language: settings.language || 'en',
          theme: settings.theme || 'blush'
        };
      } else {
        state.settings = {
          services: [...DEFAULT_SERVICES],
          currencySymbol: '$',
          commissionRate: null,
          language: 'en',
          theme: 'blush'
        };
        await pushSettingsToCloud();
      }

      lang = state.settings.language || 'en';
      applyTheme(state.settings.theme || 'blush');
    }

    async function pushEntryToCloud(entry) {
      if (!currentUser) return;
      await db.from('entries').upsert({
        id: entry.id,
        user_id: currentUser.id,
        date: entry.date,
        time: entry.time || '',
        name: entry.name || '',
        services: entry.services || [],
        price: entry.price || 0,
        notes: entry.notes || ''
      });
    }

    async function deleteEntryFromCloud(id) {
      if (!currentUser) return;
      await db.from('entries').delete().eq('id', id);
    }

    async function pushSettingsToCloud() {
      if (!currentUser) return;
      await db.from('user_settings').upsert({
        user_id: currentUser.id,
        services: state.settings.services || [],
        currency_symbol: state.settings.currencySymbol || '$',
        commission_rate: state.settings.commissionRate || null,
        language: state.settings.language || 'en',
        theme: state.settings.theme || 'blush',
        updated_at: new Date().toISOString()
      });
    }

    async function bulkUploadEntries(entries) {
      if (!currentUser || !entries.length) return;
      const rows = entries.map(e => ({
        id: e.id, user_id: currentUser.id,
        date: e.date, time: e.time || '',
        name: e.name || '', services: e.services || [],
        price: e.price || 0, notes: e.notes || ''
      }));
      await db.from('entries').upsert(rows);
    }

    // Keep localStorage as local cache for instant reads
    function saveToStorage() {
      localStorage.setItem('salon_entries', JSON.stringify(state.entries));
      localStorage.setItem('salon_settings', JSON.stringify(state.settings));
      clearTimeout(settingsSaveTimer);
      settingsSaveTimer = setTimeout(pushSettingsToCloud, 1500);
    }

    // ── AUTH ──────────────────────────────────────────────────────────────
    function phoneToEmail(phone) {
      return phone.replace(/\D/g, '') + '@nailapp.local';
    }

    async function doSignIn(phone, pin) {
      const { data, error } = await db.auth.signInWithPassword({
        email: phoneToEmail(phone), password: pin
      });
      if (error) return t('authError');
      currentUser = data.user;
      await loadFromSupabase();
      showScreen('app');
      return null;
    }

    async function doSignUp(phone, pin) {
      const email = phoneToEmail(phone);
      const { data, error } = await db.auth.signUp({ email, password: pin });
      if (error) {
        if (error.message.includes('already registered')) return t('authError');
        return error.message;
      }

      // Auto-confirm trigger fires in DB; session may or may not be immediate.
      // If null session, sign in immediately (trigger sets email_confirmed_at).
      let user = data.user;
      let session = data.session;
      if (!session) {
        const { data: siData, error: siErr } = await db.auth.signInWithPassword({ email, password: pin });
        if (siErr) return siErr.message;
        user = siData.user;
      }
      currentUser = user;

      // Migrate any existing localStorage data for this device
      const localEntries = JSON.parse(localStorage.getItem('salon_entries') || '[]');
      const localSettings = JSON.parse(localStorage.getItem('salon_settings') || 'null');

      if (localSettings) {
        state.settings = localSettings;
      } else {
        state.settings = {
          services: [...DEFAULT_SERVICES],
          currencySymbol: '$',
          commissionRate: null,
          language: 'en',
          theme: 'blush'
        };
      }
      await pushSettingsToCloud();

      if (localEntries.length > 0) {
        state.entries = localEntries;
        await bulkUploadEntries(localEntries);
        localStorage.removeItem('salon_entries');
        localStorage.removeItem('salon_settings');
      }

      await loadFromSupabase();
      showScreen('app');
      return null;
    }

    async function doSignOut() {
      if (!confirm(t('confirmSignOut'))) return;
      await db.auth.signOut();
      currentUser = null;
      state.entries = [];
      state.settings = {};
      localStorage.removeItem('salon_entries');
      localStorage.removeItem('salon_settings');
      showScreen('auth');
    }

    // ── SCREEN MANAGEMENT ─────────────────────────────────────────────────
    function showScreen(name) {
      document.getElementById('screen-loading').classList.add('hidden');
      document.getElementById('screen-auth').classList.add('hidden');
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById('nav-bar').classList.add('hidden');

      if (name === 'auth') {
        document.getElementById('screen-auth').classList.remove('hidden');
        renderAuthScreen('signin');
      } else if (name === 'app') {
        document.getElementById('nav-bar').classList.remove('hidden');
        renderNav();
        showView('calendar');
      }
    }

    function renderAuthScreen(mode) {
      const isSignin = mode === 'signin';
      document.getElementById('auth-content').innerHTML = `
        <div style="text-align:center;margin-bottom:32px">

        <div style="margin-bottom:18px">

          <input id="auth-phone" type="tel" placeholder="${t('phonePlaceholder')}"
            style="width:100%;padding:18px;border:2px solid var(--tbd);border-radius:14px;
                   font-size:22px;color:var(--td);background:#fff;outline:none;
                   box-sizing:border-box;-webkit-appearance:none">
        </div>

          <input id="auth-pin" type="password" inputmode="numeric" placeholder="${t('pinPlaceholder')}"

                   font-size:22px;color:var(--td);background:#fff;outline:none;
                   box-sizing:border-box;-webkit-appearance:none">
        </div>

        ${!isSignin ? `
        <div style="margin-bottom:8px">
          <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                        letter-spacing:0.07em;display:block;margin-bottom:8px">${t('confirmPin')}</label>
          <input id="auth-pin2" type="password" inputmode="numeric" placeholder="${t('pinPlaceholder')}"
            style="width:100%;padding:18px;border:2px solid var(--tbd);border-radius:14px;
                   font-size:22px;color:var(--td);background:#fff;outline:none;
                   box-sizing:border-box;-webkit-appearance:none">
        </div>` : ''}

        <div id="auth-error" style="color:#d00;font-size:15px;text-align:center;
                                    min-height:24px;margin:10px 0"></div>

        <button id="auth-btn" onclick="handleAuth('${mode}')"
          style="width:100%;padding:20px;
                 background:linear-gradient(135deg,var(--tp),var(--ts));
                 color:#fff;border:none;border-radius:16px;font-size:20px;font-weight:800;
                 cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.2);margin-bottom:20px">
          ${isSignin ? t('signIn') : t('createAccount')}
        </button>

        <div style="text-align:center;font-size:16px;color:var(--ts)">
          ${isSignin ? t('noAccount') : t('alreadyHaveAccount')}
          <button onclick="renderAuthScreen('${isSignin ? 'signup' : 'signin'}')"
            style="background:none;border:none;color:var(--td);font-size:16px;font-weight:800;
                   cursor:pointer;text-decoration:underline;padding:4px 8px;font-family:Georgia,serif">
            ${isSignin ? t('createAccount') : t('signIn')}
          </button>
        </div>
      `;

      requestAnimationFrame(() => {
        const el = document.getElementById('auth-phone');
        if (el) el.focus();
      });
    }

    async function handleAuth(mode) {
      const phone = (document.getElementById('auth-phone')?.value || '').trim();
      const pin   = (document.getElementById('auth-pin')?.value || '').trim();
      const pin2  = (document.getElementById('auth-pin2')?.value || '').trim();
      const btn   = document.getElementById('auth-btn');
      const errEl = document.getElementById('auth-error');
      if (!errEl) return;

      errEl.textContent = '';
      if (!phone) { errEl.textContent = t('phoneRequired'); return; }
      if (pin.length < 4) { errEl.textContent = t('pinTooShort'); return; }
      if (mode === 'signup' && pin !== pin2) { errEl.textContent = t('pinMismatch'); return; }

      btn.disabled = true;
      btn.textContent = mode === 'signin' ? t('signingIn') : t('signingUp');

      const error = mode === 'signin'
        ? await doSignIn(phone, pin)
        : await doSignUp(phone, pin);

      if (error) {
        errEl.textContent = error;
        btn.disabled = false;
        btn.textContent = mode === 'signin' ? t('signIn') : t('createAccount');
      }
    }

    // ── ROUTING ───────────────────────────────────────────────────────────
    function showView(name) {
      currentView = name;
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById('view-' + name).classList.remove('hidden');
      renderNav();
      if (name === 'calendar') renderCalendar();
      if (name === 'summary')  renderSummary();
      if (name === 'settings') renderSettings();
    }

    function renderNav() {
      const tabs = [
        { key: 'calendar', icon: '📅' },
        { key: 'summary',  icon: '📊' },
        { key: 'settings', icon: '⚙️' },
      ];

      const tabHtml = (tab) => `
        <button class="nav-tab ${currentView === tab.key ? 'active' : ''}"
          onclick="showView('${tab.key}')"
          style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0">
          <span style="font-size:22px">${tab.icon}</span>
          <span style="font-size:11px;font-weight:${currentView === tab.key ? '700' : '400'}">${t(tab.key)}</span>
        </button>
      `;

      document.getElementById('nav-bar').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-around;padding:4px 0">
          ${tabHtml(tabs[0])}
          <button onclick="openSheet(null)"
            style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--tp),var(--ts));border:none;
                   color:#fff;font-size:28px;cursor:pointer;margin-top:-16px;
                   box-shadow:0 4px 16px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center">
            +
          </button>
          ${tabHtml(tabs[1])}
          ${tabHtml(tabs[2])}
        </div>
      `;
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const sym = state.settings.currencySymbol || '$';
      const rate = state.settings.commissionRate;
      const today = formatDate(new Date());
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDow = new Date(year, month, 1).getDay();

      let monthTotal = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        monthTotal += getDayTotal(ds);
      }
      const monthTakeHome = (rate && monthTotal > 0)
        ? `<div style="font-size:12px;color:#E9C87A">${t('takeHome')} ${sym}${Math.round(monthTotal * rate / 100)}</div>`
        : '';

      const dayHeaders = t('days').map(d =>
        `<div style="text-align:center;font-size:12px;font-weight:700;color:var(--ts);padding:4px 0">${d}</div>`
      ).join('');

      let cells = Array(firstDow).fill('<div></div>').join('');

      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const entries = getDayEntries(ds);
        const total = getDayTotal(ds);
        const isToday = ds === today;
        const isSelected = ds === selectedDay;
        const hasData = entries.length > 0;

        let bg = '#fff', border = 'var(--tbd)', numColor = '#888', totalColor = 'var(--ts)', subColor = 'var(--ts)';
        if (isSelected) { bg = 'var(--ts)'; border = 'var(--ts)'; numColor = '#fff'; totalColor = '#fff'; subColor = 'rgba(255,255,255,0.7)'; }
        else if (isToday) { bg = 'var(--td)'; border = 'var(--td)'; numColor = 'var(--tp)'; totalColor = 'var(--tp)'; subColor = 'var(--tp)'; }
        else if (hasData) { bg = 'var(--tlt)'; border = 'var(--tp)'; }

        const takeHomeGold = (rate && hasData && !isSelected && !isToday)
          ? `<div style="font-size:9px;color:#E9C87A;margin-top:1px">${sym}${Math.round(total * rate / 100)}</div>`
          : '';
        const clientWord = entries.length === 1 ? t('client') : t('clients');

        cells += `
          <div onclick="selectDay('${ds}')"
            style="border-radius:10px;padding:6px 3px;min-height:64px;text-align:center;cursor:pointer;
                   background:${bg};border:2px solid ${border};transition:transform 0.1s">
            <div style="font-size:12px;font-weight:600;color:${numColor}">${d}</div>
            ${hasData ? `
              <div style="font-size:14px;font-weight:800;color:${totalColor};line-height:1;margin-top:2px">${sym}${total}</div>
              ${takeHomeGold}
              <div style="font-size:10px;color:${subColor};margin-top:2px">${entries.length} ${clientWord}</div>
            ` : ''}
          </div>`;
      }

      let dayPanel = '';
      if (selectedDay) {
        const dayEntries = getDayEntries(selectedDay);
        const dayTotal = getDayTotal(selectedDay);
        const dd = new Date(selectedDay + 'T12:00:00');
        const dayLabel = `${t('days')[(dd.getDay()+7)%7]} ${t('months')[dd.getMonth()]} ${dd.getDate()}`;
        const dayTakeHome = rate
          ? `<div style="font-size:12px;color:#E9C87A;margin-top:2px">${t('takeHome')} ${sym}${Math.round(dayTotal * rate / 100)}</div>`
          : '';

        const rows = dayEntries.length
          ? dayEntries.map(e => `
              <div style="background:var(--tb);border-radius:10px;padding:12px 14px;margin-bottom:8px;
                          display:flex;align-items:center;gap:12px">
                <div style="font-size:12px;color:var(--ts);font-weight:700;min-width:42px">${e.time || '—'}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:15px;font-weight:700;color:var(--td)">${e.name || '—'}</div>
                  <div style="font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(e.services||[]).join(' · ')}</div>
                  ${e.notes ? `<div style="font-size:11px;color:#bbb;margin-top:2px">${e.notes}</div>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                  <div style="font-size:17px;font-weight:800;color:var(--td)">${sym}${e.price}</div>
                  <button onclick="openSheet('${e.date}','${e.id}')" title="${t('editEntry')}"
                    style="width:28px;height:28px;border-radius:50%;background:var(--tb);border:none;
                           color:var(--ts);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">✎</button>
                  <button onclick="deleteEntry('${e.id}')" title="${t('deleteEntry')}"
                    style="width:28px;height:28px;border-radius:50%;background:var(--tb);border:none;
                           color:var(--tp);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">×</button>
                </div>
              </div>`).join('')
          : `<div style="text-align:center;color:#ccc;padding:24px;font-size:16px">${t('noEntries')}</div>`;

        dayPanel = `
          <div style="background:#fff;border:2px solid var(--tp);border-top:none;border-radius:0 0 16px 16px;padding:16px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
              <div>
                <div style="font-size:18px;font-weight:700;color:var(--td)">${dayLabel}</div>
                ${dayTakeHome}
              </div>
              <div style="background:#E9C87A;color:#4A2D3A;border-radius:20px;padding:5px 14px;
                          font-size:14px;font-weight:800">${sym}${dayTotal} ${t('totalGross')}</div>
            </div>
            ${rows}
            <button onclick="openSheet('${selectedDay}')"
              style="width:100%;padding:14px;background:var(--tb);border:2px dashed var(--tp);
                     border-radius:10px;color:var(--ts);font-size:15px;font-weight:700;
                     cursor:pointer;margin-top:4px">
              + ${t('addCustomer')}
            </button>
          </div>`;
      }

      const hasAnyEntries = state.entries.some(e =>
        e.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)
      );
      const emptyState = (!selectedDay && !hasAnyEntries)
        ? `<div style="text-align:center;padding:32px 24px;color:var(--ts)">
             <div style="font-size:48px;margin-bottom:12px">💅</div>
             <div style="font-size:18px;font-weight:700;color:var(--td);margin-bottom:6px">${t('noEntries')}</div>
             <div style="font-size:14px;opacity:0.7">${t('tapToAdd')}</div>
           </div>`
        : '';

      document.getElementById('view-calendar').innerHTML = `
        <div>
          <div style="background:var(--tp);padding:20px 16px;display:flex;align-items:center;justify-content:space-between">
            <button onclick="prevMonth()"
              style="background:rgba(255,255,255,0.4);border:none;border-radius:50%;
                     width:40px;height:40px;font-size:22px;cursor:pointer;color:var(--td);
                     display:flex;align-items:center;justify-content:center">‹</button>
            <div style="text-align:center">
              <div style="font-size:22px;font-weight:700;color:var(--td)">${t('months')[month]} ${year}</div>
              <div style="font-size:13px;color:var(--td);opacity:0.7;margin-top:2px">${sym}${monthTotal} ${t('totalGross')}</div>
              ${monthTakeHome}
            </div>
            <button onclick="nextMonth()"
              style="background:rgba(255,255,255,0.4);border:none;border-radius:50%;
                     width:40px;height:40px;font-size:22px;cursor:pointer;color:var(--td);
                     display:flex;align-items:center;justify-content:center">›</button>
          </div>

          <div style="background:var(--tb);padding:12px">
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">${dayHeaders}</div>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
          </div>

          ${dayPanel}
          ${emptyState}
        </div>`;
    }

    function renderSummary() {
      const sym = state.settings.currencySymbol || '$';
      const rate = state.settings.commissionRate;
      const anchor = summaryAnchor;
      const { start, end } = getPeriodRange(currentPeriod, anchor);
      const entries = getPeriodEntries(start, end);
      const gross = entries.reduce((s, e) => s + (e.price || 0), 0);
      const customerCount = entries.length;

      const fmtD = ds => {
        const d = new Date(ds + 'T12:00:00');
        return `${t('months')[d.getMonth()].replace('Tháng ','T.')} ${d.getDate()}`;
      };
      const rangeLabel = `${fmtD(start)} – ${fmtD(end)}, ${new Date(end + 'T12:00:00').getFullYear()}`;

      const takeHomeCard = (rate && gross > 0)
        ? `<div style="margin-top:8px;font-size:18px;color:#E9C87A;font-weight:700">
             ${t('takeHome')} ${sym}${Math.round(gross * rate / 100)}
           </div>`
        : '';

      const periods = ['weekly','biweekly','monthly'];
      const toggleBtns = periods.map(p => `
        <button onclick="switchPeriod('${p}')"
          style="flex:1;padding:12px 8px;border:none;border-radius:10px;
                 font-size:14px;font-weight:700;cursor:pointer;font-family:Georgia,serif;
                 background:${currentPeriod===p ? '#fff' : 'transparent'};
                 color:${currentPeriod===p ? 'var(--td)' : 'var(--ts)'};
                 box-shadow:${currentPeriod===p ? '0 2px 8px rgba(0,0,0,0.1)' : 'none'}">
          ${t(p)}
        </button>`).join('');

      const svcCount = {};
      entries.forEach(e => (e.services||[]).forEach(s => { svcCount[s] = (svcCount[s]||0) + 1; }));
      const svcSorted = Object.entries(svcCount).sort((a,b) => b[1]-a[1]);
      const maxCount = svcSorted[0]?.[1] || 1;

      const bars = svcSorted.length
        ? svcSorted.map(([svc, cnt]) => `
            <div style="margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:15px;color:var(--td);font-weight:600">${svc}</span>
                <span style="font-size:15px;color:var(--ts);font-weight:800">${cnt} ${t('times')}</span>
              </div>
              <div style="background:var(--tb);border-radius:99px;height:10px">
                <div style="height:10px;border-radius:99px;
                            background:linear-gradient(90deg,var(--tp),#E9C87A);
                            width:${Math.round(cnt/maxCount*100)}%"></div>
              </div>
            </div>`).join('')
        : `<div style="text-align:center;color:#ccc;padding:16px">${t('noServiceData')}</div>`;

      document.getElementById('view-summary').innerHTML = `
        <div style="padding:24px 16px">

          <div style="background:var(--tb);border-radius:14px;padding:4px;display:flex;gap:4px;margin-bottom:16px">
            ${toggleBtns}
          </div>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <button onclick="shiftAnchor(-1)"
              style="width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;
                     font-size:22px;cursor:pointer;color:var(--td);display:flex;align-items:center;justify-content:center">‹</button>
            <div style="text-align:center;font-size:13px;color:var(--ts);font-weight:600">${rangeLabel}</div>
            <button onclick="shiftAnchor(1)"
              style="width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;
                     font-size:22px;cursor:pointer;color:var(--td);display:flex;align-items:center;justify-content:center;
                     opacity:${end >= formatDate(new Date()) ? '0.25' : '1'};
                     pointer-events:${end >= formatDate(new Date()) ? 'none' : 'auto'}">›</button>
          </div>

          <div style="background:linear-gradient(135deg,var(--tp),var(--ts));border-radius:20px;
                      padding:28px 24px;color:#fff;text-align:center;margin-bottom:16px">
            <div style="font-size:52px;font-weight:900;line-height:1;letter-spacing:-0.02em">${sym}${gross}</div>
            <div style="font-size:14px;opacity:0.85;margin-top:6px">${t('totalGross')}</div>
            ${takeHomeCard}
          </div>

          <div style="background:#fff;border:1px solid var(--tbd);border-radius:16px;
                      padding:20px;text-align:center;margin-bottom:16px">
            <div style="font-size:36px;font-weight:800;color:var(--td)">${customerCount}</div>
            <div style="font-size:12px;color:var(--ts);font-weight:700;text-transform:uppercase;
                        letter-spacing:0.05em;margin-top:4px">${t('customersServed')}</div>
          </div>

          <div style="background:#fff;border:1px solid var(--tbd);border-radius:16px;padding:20px">
            <div style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                        letter-spacing:0.07em;margin-bottom:16px">${t('byService')}</div>
            ${bars}
          </div>

        </div>`;
    }

    function exportCSV() {
      const sym = state.settings.currencySymbol || '$';
      const headers = ['Date','Time','Name','Services','Price (' + sym + ')','Notes'];
      const rows = [...state.entries]
        .sort((a, b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''))
        .map(e => [
          e.date, e.time || '', e.name || '',
          (e.services||[]).join('; '),
          e.price, e.notes || ''
        ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'salon-tracker-export.csv';
      a.click();
    }

    function deleteEntry(id) {
      if (!confirm(t('confirmDelete'))) return;
      state.entries = state.entries.filter(e => e.id !== id);
      saveToStorage();
      renderCalendar();
      deleteEntryFromCloud(id);
    }

    function switchPeriod(period) {
      currentPeriod = period;
      summaryAnchor = new Date();
      renderSummary();
    }

    function shiftAnchor(dir) {
      const d = new Date(summaryAnchor);
      if (currentPeriod === 'weekly')   d.setDate(d.getDate() + dir * 7);
      if (currentPeriod === 'biweekly') d.setDate(d.getDate() + dir * 14);
      if (currentPeriod === 'monthly')  d.setMonth(d.getMonth() + dir);
      summaryAnchor = d;
      renderSummary();
    }

    function deleteService(idx) {
      editingServiceIdx = null;
      state.settings.services.splice(idx, 1);
      saveToStorage();
      renderSettings();
    }

    function addService(name) {
      const n = name.trim();
      if (!n) return;
      state.settings.services.push(n);
      saveToStorage();
      renderSettings();
    }

    function editService(idx) {
      editingServiceIdx = idx;
      renderSettings();
      requestAnimationFrame(() => {
        const input = document.getElementById('edit-svc-input');
        if (input) { input.focus(); input.select(); }
      });
    }

    function saveServiceEdit(idx, val) {
      const n = val.trim();
      if (n) state.settings.services[idx] = n;
      editingServiceIdx = null;
      saveToStorage();
      renderSettings();
    }

    function cancelEditService() {
      editingServiceIdx = null;
      renderSettings();
    }

    function saveSettings(updates) {
      Object.assign(state.settings, updates);
      saveToStorage();
    }

    function setLanguage(l) {
      lang = l;
      state.settings.language = l;
      saveToStorage();
      renderNav();
      showView('settings');
    }

    function renderSettings() {
      const sym = state.settings.currencySymbol || '$';
      const rate = state.settings.commissionRate || '';
      const services = state.settings.services || DEFAULT_SERVICES;
      const activeTheme = state.settings.theme || 'blush';

      // Phone number display (strip @nailapp.local from email)
      const phoneDisplay = currentUser?.email
        ? currentUser.email.replace('@nailapp.local', '')
        : '';

      const serviceRows = services.map((svc, i) => {
        if (i === editingServiceIdx) {
          return `
            <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--tb)">
              <input id="edit-svc-input" type="text" value="${svc.replace(/"/g, '&quot;')}"
                onkeydown="if(event.key==='Enter'){saveServiceEdit(${i},this.value)}else if(event.key==='Escape'){cancelEditService()}"
                style="flex:1;padding:10px 12px;border:2px solid var(--tp);border-radius:10px;
                       font-size:16px;color:var(--td);background:#fff;outline:none;font-family:Georgia,serif">
              <button onclick="saveServiceEdit(${i},document.getElementById('edit-svc-input').value)"
                style="padding:9px 14px;background:var(--tp);color:var(--td);border:none;
                       border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap">
                ${t('saveCustomer')}
              </button>
              <button onclick="cancelEditService()"
                style="padding:9px 12px;background:var(--tb);color:var(--ts);border:none;
                       border-radius:9px;font-size:14px;font-weight:800;cursor:pointer">
                ${t('cancel')}
              </button>
            </div>`;
        }
        return `
          <div style="display:flex;align-items:center;justify-content:space-between;
                      padding:13px 0;border-bottom:1px solid var(--tb)">
            <span style="font-size:17px;color:var(--td)">${svc}</span>
            <div style="display:flex;gap:6px">
              <button onclick="editService(${i})"
                style="width:32px;height:32px;border-radius:50%;background:var(--tb);border:none;
                       color:var(--ts);font-size:15px;cursor:pointer;
                       display:flex;align-items:center;justify-content:center">✎</button>
              <button onclick="deleteService(${i})"
                style="width:32px;height:32px;border-radius:50%;background:var(--tb);border:none;
                       color:var(--tp);font-size:20px;cursor:pointer;
                       display:flex;align-items:center;justify-content:center;line-height:1">×</button>
            </div>
          </div>`;
      }).join('');

      const sectionTitle = label => `
        <div style="font-size:13px;font-weight:700;color:var(--ts);text-transform:uppercase;
                    letter-spacing:0.07em;margin:24px 0 10px">${label}</div>`;

      const card = content => `
        <div style="background:#fff;border:1px solid var(--tbd);border-radius:16px;overflow:hidden">${content}</div>`;

      const row = content => `
        <div style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between;
                    border-bottom:1px solid var(--tb)">${content}</div>`;

      const themeSwatches = Object.keys(THEMES).map(name => {
        const isActive = activeTheme === name;
        const swatchColor = THEMES[name].tp;
        const labelKey = 'theme' + name.charAt(0).toUpperCase() + name.slice(1);
        return `
          <div onclick="setTheme('${name}')" style="text-align:center;cursor:pointer;padding:4px">
            <div style="width:52px;height:52px;border-radius:50%;background:${swatchColor};margin:0 auto 6px;
                        border:3px solid ${isActive ? 'var(--td)' : 'transparent'};
                        box-shadow:0 2px 8px rgba(0,0,0,0.15);
                        display:flex;align-items:center;justify-content:center">
              ${isActive ? '<span style="color:#fff;font-size:20px;font-weight:800">✓</span>' : ''}
            </div>
            <div style="font-size:12px;font-weight:${isActive ? '800' : '400'};color:var(--td)">${t(labelKey)}</div>
          </div>`;
      }).join('');

      document.getElementById('view-settings').innerHTML = `
        <div style="padding:24px 16px">

          ${sectionTitle(t('theme'))}
          ${card(`
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:16px 10px">
              ${themeSwatches}
            </div>
          `)}

          ${sectionTitle(t('language'))}
          ${card(row(`
            <div>
              <div style="font-size:17px;color:var(--td);font-weight:600">${t('language')}</div>
            </div>
            <div style="display:flex;background:var(--tb);border-radius:10px;padding:3px;gap:3px">
              <button onclick="setLanguage('en')"
                style="padding:9px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;
                       cursor:pointer;font-family:Georgia,serif;
                       background:${lang==='en' ? '#fff' : 'transparent'};
                       color:${lang==='en' ? 'var(--td)' : 'var(--ts)'};
                       box-shadow:${lang==='en' ? '0 2px 6px rgba(0,0,0,0.1)' : 'none'}">EN</button>
              <button onclick="setLanguage('vi')"
                style="padding:9px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;
                       cursor:pointer;font-family:Georgia,serif;
                       background:${lang==='vi' ? '#fff' : 'transparent'};
                       color:${lang==='vi' ? 'var(--td)' : 'var(--ts)'};
                       box-shadow:${lang==='vi' ? '0 2px 6px rgba(0,0,0,0.1)' : 'none'}">VI</button>
            </div>
          `))}

          ${sectionTitle(t('currency') + ' & ' + t('commissionRate'))}
          ${card(`
            ${row(`
              <div>
                <div style="font-size:17px;color:var(--td);font-weight:600">${t('currency')}</div>
              </div>
              <input type="text" value="${sym}" maxlength="3"
                onchange="saveSettings({currencySymbol:this.value||'$'})"
                style="width:60px;padding:10px;border:2px solid var(--tbd);border-radius:10px;
                       font-size:18px;font-weight:800;color:var(--td);background:var(--tb);
                       text-align:center;outline:none">
            `)}
            <div style="padding:16px 18px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div>
                  <div style="font-size:17px;color:var(--td);font-weight:600">${t('commissionRate')}</div>
                  <div style="font-size:12px;color:#aaa;margin-top:2px">${t('commissionRateSub')}</div>
                </div>
                <div style="display:flex;align-items:center;gap:0">
                  <input type="number" value="${rate}" min="0" max="100" placeholder="—"
                    onchange="saveSettings({commissionRate: this.value ? parseFloat(this.value) : null})"
                    style="width:70px;padding:10px 12px;border:2px solid var(--tbd);border-radius:10px 0 0 10px;
                           font-size:20px;font-weight:800;color:var(--td);background:var(--tb);
                           text-align:center;outline:none;border-right:none">
                  <div style="background:#E9C87A;color:#4A2D3A;font-size:18px;font-weight:800;
                              padding:10px 14px;border-radius:0 10px 10px 0;
                              border:2px solid #D4B060;border-left:none">%</div>
                </div>
              </div>
            </div>
          `)}

          ${sectionTitle(t('exportCSV'))}
          ${card(`
            <div style="padding:16px 18px;display:flex;align-items:center;justify-content:space-between">
              <div>
                <div style="font-size:17px;font-weight:600;color:var(--td)">${t('exportCSV')}</div>
                <div style="font-size:12px;color:#aaa;margin-top:2px">${t('exportCSVSub')}</div>
              </div>
              <button onclick="exportCSV()"
                style="padding:12px 20px;background:var(--tp);color:var(--td);border:none;
                       border-radius:10px;font-size:15px;font-weight:800;cursor:pointer">
                ↓ CSV
              </button>
            </div>
          `)}

          ${sectionTitle(t('services'))}
          ${card(`
            <div style="padding:0 18px">${serviceRows}</div>
            <div style="display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--tb)">
              <input id="new-svc-input" type="text" placeholder="${t('newServicePlaceholder')}"
                style="flex:1;padding:12px 14px;border:2px solid var(--tbd);border-radius:10px;
                       font-size:16px;color:var(--td);background:var(--tb);outline:none"
                onkeydown="if(event.key==='Enter'){addService(this.value);this.value=''}">
              <button onclick="addService(document.getElementById('new-svc-input').value);document.getElementById('new-svc-input').value=''"
                style="padding:12px 20px;background:var(--tp);color:var(--td);border:none;
                       border-radius:10px;font-size:16px;font-weight:800;cursor:pointer">
                ${t('addBtn')}
              </button>
            </div>
          `)}

          ${sectionTitle(t('account'))}
          ${card(`
            <div style="padding:16px 18px;border-bottom:1px solid var(--tb)">
              <div style="font-size:12px;color:#aaa;font-weight:700;text-transform:uppercase;
                          letter-spacing:0.07em;margin-bottom:4px">${t('yourPhone')}</div>
              <div style="font-size:18px;font-weight:700;color:var(--td)">${phoneDisplay}</div>
            </div>
            <div style="padding:16px 18px">
              <button onclick="doSignOut()"
                style="width:100%;padding:16px;background:#FFF0F0;color:#C0392B;
                       border:2px solid #FFCCCC;border-radius:12px;
                       font-size:17px;font-weight:800;cursor:pointer;font-family:Georgia,serif">
                ${t('signOut')}
              </button>
            </div>
          `)}

        </div>`;
    }

    function openSheet(dateStr, entryId = null) {
      editingEntryId = entryId;
      const entry = entryId ? state.entries.find(e => e.id === entryId) : null;
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const defaultDate = entry ? entry.date : (dateStr || formatDate(new Date()));
      const defaultTime = entry ? (entry.time || `${hh}:${mm}`) : `${hh}:${mm}`;
      const sym = state.settings.currencySymbol || '$';
      const rate = state.settings.commissionRate;
      const services = state.settings.services || DEFAULT_SERVICES;

      const selectedSvcs = entry ? (entry.services || []) : [];
      const serviceChips = services.map((svc, i) => {
        const preSelected = selectedSvcs.includes(svc);
        return `
          <div class="svc-chip ${preSelected ? 'selected' : ''}" data-svc="${i}"
            onclick="this.classList.toggle('selected')"
            style="padding:13px 8px;border-radius:10px;border:2px solid var(--tbd);
                   background:var(--tb);text-align:center;font-size:14px;
                   color:var(--td);cursor:pointer;transition:all 0.15s;min-height:48px;
                   display:flex;align-items:center;justify-content:center">
            ${svc}
          </div>`;
      }).join('');

      const rateHelper = rate
        ? `<div id="rate-helper" style="font-size:13px;color:#E9C87A;margin-top:6px;min-height:20px"></div>`
        : '';

      document.getElementById('sheet-content').innerHTML = `
        <div style="padding:24px 20px 32px">
          <div style="width:40px;height:4px;background:var(--tp);border-radius:4px;margin:0 auto 20px"></div>
          <div style="font-size:22px;font-weight:800;color:var(--td);margin-bottom:4px">${entry ? t('editEntry') : t('addCustomer')}</div>
          <div style="font-size:13px;color:var(--ts);margin-bottom:24px">${defaultDate}</div>

          <div style="margin-bottom:20px">
            <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                          letter-spacing:0.05em;display:block;margin-bottom:8px">
              ${t('customerName')} <span style="color:#ccc;font-weight:400">${t('optional')}</span>
            </label>
            <input id="f-name" type="text" placeholder="${t('namePlaceholder')}" value="${entry ? (entry.name || '') : ''}"
              style="width:100%;padding:14px 16px;border:2px solid var(--tbd);border-radius:12px;
                     font-size:18px;color:var(--td);background:var(--tb);outline:none">
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                            letter-spacing:0.05em;display:block;margin-bottom:8px">${t('date')}</label>
              <input id="f-date" type="date" value="${defaultDate}"
                style="width:100%;padding:14px 12px;border:2px solid var(--tbd);border-radius:12px;
                       font-size:15px;color:var(--td);background:var(--tb);outline:none">
            </div>
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                            letter-spacing:0.05em;display:block;margin-bottom:8px">${t('time')}</label>
              <input id="f-time" type="time" value="${defaultTime}"
                style="width:100%;padding:14px 12px;border:2px solid var(--tbd);border-radius:12px;
                       font-size:15px;color:var(--td);background:var(--tb);outline:none">
            </div>
          </div>

          <div style="margin-bottom:20px">
            <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                          letter-spacing:0.05em;display:block;margin-bottom:8px">${t('servicesDone')}</label>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">${serviceChips}</div>
          </div>

          <div style="margin-bottom:20px">
            <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                          letter-spacing:0.05em;display:block;margin-bottom:8px">${t('price')}</label>
            <div style="display:flex;align-items:center">
              <div style="background:#E9C87A;color:#4A2D3A;font-size:20px;font-weight:800;
                          padding:14px 16px;border-radius:12px 0 0 12px;
                          border:2px solid #D4B060;border-right:none">${sym}</div>
              <input id="f-price" type="number" inputmode="decimal" placeholder="0" min="0"
                value="${entry ? entry.price : ''}"
                style="flex:1;padding:14px 16px;border:2px solid var(--tbd);border-radius:0 12px 12px 0;
                       font-size:22px;font-weight:800;color:var(--td);background:var(--tb);outline:none;
                       border-left:none"
                ${rate ? `oninput="updateTakeHome(this.value)"` : ''}>
            </div>
            ${rateHelper}
          </div>

          <div style="margin-bottom:24px">
            <label style="font-size:13px;font-weight:700;color:var(--td);text-transform:uppercase;
                          letter-spacing:0.05em;display:block;margin-bottom:8px">
              ${t('notes')} <span style="color:#ccc;font-weight:400">${t('optional')}</span>
            </label>
            <input id="f-notes" type="text" placeholder="${t('notesPlaceholder')}" value="${entry ? (entry.notes || '') : ''}"
              style="width:100%;padding:14px 16px;border:2px solid var(--tbd);border-radius:12px;
                     font-size:18px;color:var(--td);background:var(--tb);outline:none">
          </div>

          <button onclick="submitSheet()"
            style="width:100%;padding:18px;background:linear-gradient(135deg,var(--tp),var(--ts));
                   color:#fff;border:none;border-radius:14px;font-size:20px;font-weight:800;
                   cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2)">
            ${t('saveCustomer')}
          </button>
        </div>`;

      document.getElementById('sheet-overlay').classList.remove('hidden');
      requestAnimationFrame(() => document.getElementById('sheet-add').classList.add('open'));
    }

    function updateTakeHome(val) {
      const rate = state.settings.commissionRate;
      const el = document.getElementById('rate-helper');
      if (!el || !rate) return;
      const sym = state.settings.currencySymbol || '$';
      const price = parseFloat(val) || 0;
      el.textContent = price > 0 ? `${t('takeHome')} ${sym}${Math.round(price * rate / 100)}` : '';
    }

    function submitSheet() {
      const name = document.getElementById('f-name').value.trim();
      const date = document.getElementById('f-date').value;
      const time = document.getElementById('f-time').value;
      const price = parseFloat(document.getElementById('f-price').value) || 0;
      const notes = document.getElementById('f-notes').value.trim();
      const selectedChips = document.querySelectorAll('.svc-chip.selected');
      const services = Array.from(selectedChips).map(el =>
        (state.settings.services || DEFAULT_SERVICES)[parseInt(el.dataset.svc)]
      );

      if (!date || !time || price <= 0) {
        alert(lang === 'vi' ? 'Vui lòng nhập ngày, giờ và giá.' : 'Please enter date, time, and price.');
        return;
      }

      if (editingEntryId) {
        const idx = state.entries.findIndex(e => e.id === editingEntryId);
        if (idx !== -1) {
          state.entries[idx] = { id: editingEntryId, name, date, time, price, services, notes };
          pushEntryToCloud(state.entries[idx]);
        }
        editingEntryId = null;
        saveToStorage();
        closeSheet();
        selectedDay = date;
        renderCalendar();
      } else {
        saveEntry({ name, date, time, price, services, notes });
      }
    }

    function closeSheet() {
      editingEntryId = null;
      document.getElementById('sheet-add').classList.remove('open');
      document.getElementById('sheet-overlay').classList.add('hidden');
    }

    function prevMonth() {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
      selectedDay = null;
      renderCalendar();
    }
    function nextMonth() {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
      selectedDay = null;
      renderCalendar();
    }
    function selectDay(dateStr) {
      selectedDay = selectedDay === dateStr ? null : dateStr;
      renderCalendar();
    }

    function saveEntry(data) {
      const entry = { id: generateId(), ...data };
      state.entries.push(entry);
      saveToStorage();
      closeSheet();
      selectedDay = data.date;
      renderCalendar();
      pushEntryToCloud(entry);
    }

    // ── INIT ─────────────────────────────────────────────────────────────
    async function init() {
      if (!db) return; // Supabase failed to load — error already shown

      // Try reading cached theme immediately so the loading screen matches
      try {
        const cached = JSON.parse(localStorage.getItem('salon_settings') || '{}');
        if (cached.theme) applyTheme(cached.theme);
        if (cached.language) lang = cached.language;
      } catch(e) {}

      // Fallback: if still on loading screen after 8s, show auth anyway
      const loadingTimeout = setTimeout(() => {
        const loading = document.getElementById('screen-loading');
        if (!loading.classList.contains('hidden')) showScreen('auth');
      }, 8000);

      const { data: { session } } = await db.auth.getSession();
      clearTimeout(loadingTimeout);

      if (session) {
        currentUser = session.user;
        await loadFromSupabase();
        showScreen('app');
      } else {
        showScreen('auth');
      }
    }

    init();
  </script>
</body>
</html>
